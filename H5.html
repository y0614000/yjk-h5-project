<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#06142b">
  <title>海南自由贸易港全岛封关运作</title>
  <style>
    @property --cta-border-angle {
      syntax: "<angle>";
      inherits: false;
      initial-value: 0deg;
    }

    :root {
      --bg-deep: #06142b;
      --bg-deeper: #030b17;
      --line-soft: rgba(255, 255, 255, 0.12);
      --text-soft: rgba(255, 255, 255, 0.72);
      --gold-soft: #f1dbb1;
      --gold-deep: #cfa971;
      --glow-cyan: rgba(104, 188, 255, 0.32);
      --glow-gold: rgba(241, 219, 177, 0.18);
      --hero-max-width: 430px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(44, 99, 169, 0.34), transparent 32%),
        linear-gradient(180deg, #06142b 0%, #040d1c 100%);
      font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .app {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    .section {
      position: relative;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transition:
        opacity 800ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 800ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 800ms cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform, filter;
    }

    #start {
      z-index: 2;
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    #start.is-leaving {
      opacity: 0;
      transform: scale(1.04);
      filter: blur(10px);
      pointer-events: none;
    }

    #science {
      z-index: 1;
      opacity: 0;
      transform: translateY(36px) scale(0.48);
      filter: blur(8px);
      pointer-events: none;
      transition:
        opacity 900ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 900ms cubic-bezier(0.22, 1, 0.36, 1),
        filter 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    #science.is-active {
      z-index: 3;
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
      pointer-events: auto;
    }

    .hero {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(24px, env(safe-area-inset-top))
        20px
        max(24px, env(safe-area-inset-bottom));
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("images/homeBg.png") center center / cover no-repeat;
      transform: scale(1.02);
      z-index: -4;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 52% 20%, rgba(255, 255, 255, 0.08), transparent 34%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, rgba(120, 210, 255, 0.03) 48%, rgba(255, 255, 255, 0.01) 100%);
      z-index: -3;
    }

    .hero-beam {
      position: absolute;
      top: -14%;
      width: 56vw;
      min-width: 220px;
      max-width: 320px;
      height: 52vh;
      background: linear-gradient(180deg, rgba(148, 214, 255, 0.34), rgba(148, 214, 255, 0));
      opacity: 0.52;
      filter: blur(10px);
      transform-origin: top center;
      mix-blend-mode: screen;
      z-index: -2;
      pointer-events: none;
    }

    .hero-beam--left {
      left: -8%;
      transform: rotate(14deg);
      animation: beamDriftLeft 13s ease-in-out infinite;
    }

    .hero-beam--right {
      right: -12%;
      transform: rotate(-16deg);
      animation: beamDriftRight 16s ease-in-out infinite;
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 100% 80px, 80px 100%;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0) 8%, #000 30%, rgba(0, 0, 0, 0.16) 72%, rgba(0, 0, 0, 0) 100%);
      opacity: 0.08;
      z-index: -1;
      pointer-events: none;
    }

    .hero-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .hero-particles::before,
    .hero-particles::after {
      content: "";
      position: absolute;
      left: 6%;
      right: 6%;
      top: 8%;
      height: 34%;
      background:
        radial-gradient(circle at 6% 56%, rgba(255, 255, 255, 0.75) 0 1px, transparent 2px),
        radial-gradient(circle at 16% 30%, rgba(255, 255, 255, 0.58) 0 1.1px, transparent 2.2px),
        radial-gradient(circle at 28% 44%, rgba(215, 240, 255, 0.72) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 18%, rgba(255, 255, 255, 0.62) 0 1.15px, transparent 2.2px),
        radial-gradient(circle at 54% 52%, rgba(255, 255, 255, 0.55) 0 1px, transparent 2px),
        radial-gradient(circle at 66% 26%, rgba(215, 240, 255, 0.78) 0 1.15px, transparent 2.2px),
        radial-gradient(circle at 78% 46%, rgba(255, 255, 255, 0.56) 0 1px, transparent 2px),
        radial-gradient(circle at 88% 22%, rgba(255, 255, 255, 0.7) 0 1.1px, transparent 2.2px);
      opacity: 0.42;
      animation: particleTwinkle 5.4s ease-in-out infinite;
    }

    .hero-particles::after {
      left: 0;
      right: 0;
      top: 4%;
      height: 40%;
      opacity: 0.22;
      filter: blur(1px);
      transform: scale(1.04);
      animation-duration: 6.6s;
      animation-delay: -2.4s;
    }

    .sun-rays {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: hidden;
    }

    .sun-rays::before,
    .sun-rays::after {
      content: "";
      position: absolute;
      top: -18%;
      right: -20%;
      width: 90%;
      height: 72%;
      transform: rotate(-18deg);
      transform-origin: top right;
      background:
        linear-gradient(
          100deg,
          transparent 0%,
          rgba(255, 255, 255, 0.04) 18%,
          rgba(255, 245, 200, 0.22) 38%,
          rgba(255, 255, 255, 0.05) 52%,
          transparent 72%
        );
      filter: blur(10px);
      opacity: 0.75;
      animation: sunRayFloat 8s ease-in-out infinite;
    }

    .sun-rays::after {
      top: -12%;
      right: -34%;
      width: 110%;
      height: 82%;
      opacity: 0.45;
      filter: blur(18px);
      animation-duration: 12s;
      animation-delay: -3s;
    }

    .hero-content {
      width: min(100%, var(--hero-max-width));
      padding: 0 8px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 3;
      isolation: isolate;
      transform: translateY(-13vh);
    }

    .hero-content::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 48%;
      width: 120%;
      height: 120%;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        ellipse,
        rgba(255, 255, 255, 0.32) 0%,
        rgba(120, 210, 255, 0.16) 42%,
        rgba(255, 255, 255, 0) 72%
      );
      filter: blur(24px);
      z-index: -1;
    }

    .hero-kicker,
    .hero-eyebrow {
      margin-bottom: 18px;
      font-size: 12px;
      line-height: 1.4;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 500;
      text-transform: uppercase;
      text-shadow: 0 8px 18px rgba(4, 13, 31, 0.18);
    }

    .hero-title {
      margin: 0;
      display: grid;
      gap: 8px;
      font-size: clamp(2.3rem, 10vw, 3.5rem);
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: none;
      filter: drop-shadow(0 5px 14px rgba(0, 96, 160, 0.22));
    }

    .hero-title span {
      display: block;
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #ffffff 58%,
        #fff1c2 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle,
    .hero-slogan {
      margin: 24px 0 0;
      font-size: clamp(0.94rem, 4vw, 1.1rem);
      line-height: 1.8;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.96);
      font-weight: 700;
      padding-left: 2px;
      text-shadow:
        0 2px 10px rgba(0, 90, 160, 0.22),
        0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .hero-subtitle {
      position: relative;
      z-index: 0;
    }

    .hero-subtitle::before {
      content: "";
      position: absolute;
      inset: -12px -24px;
      background:
        radial-gradient(
          ellipse,
          rgba(255, 255, 255, 0.18) 0%,
          rgba(180, 230, 255, 0.1) 48%,
          rgba(255, 255, 255, 0) 78%
        );
      filter: blur(16px);
      z-index: -1;
      pointer-events: none;
    }

    .hero-cta {
      --cta-border-angle: 0deg;
      position: relative;
      display: inline-flex;
      margin-top: 51px;
      padding: 2px;
      border-radius: 999px;
      overflow: visible;
      isolation: isolate;
    }

    .hero-cta::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    .hero-cta::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      padding: 2px;
      background: conic-gradient(
        from var(--cta-border-angle),
        rgba(255, 255, 255, 0) 0deg,
        rgba(255, 255, 255, 0) 248deg,
        rgba(123, 214, 255, 0.24) 270deg,
        rgba(123, 214, 255, 0.62) 290deg,
        rgba(255, 255, 255, 1) 314deg,
        rgba(255, 241, 194, 1) 334deg,
        rgba(255, 255, 255, 0.96) 350deg,
        rgba(123, 214, 255, 0.42) 358deg,
        rgba(255, 255, 255, 0) 360deg
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 1;
      filter: blur(0.15px);
      animation: borderFlow 2.4s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    .hero-button {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 196px;
      height: 56px;
      padding: 0 32px;
      border-radius: 999px;
      color: #0077b6;
      background-color: rgba(255, 255, 255, 0.32);
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.42), rgba(210, 240, 255, 0.26));
      border: 1px solid rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.65);
      transition: transform 0.24s ease, box-shadow 0.24s ease, background 0.24s ease;
      animation: glow 2.8s ease-in-out infinite;
    }

    .hero-button::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.04));
      opacity: 0.72;
      z-index: -1;
    }

    .hero-kicker,
    .hero-title,
    .hero-subtitle,
    .hero-cta {
      opacity: 0;
      transform: translateY(32px);
      animation: heroFadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .hero-kicker {
      animation-delay: 0.15s;
    }

    .hero-title {
      animation-delay: 0.3s;
    }

    .hero-subtitle {
      animation-delay: 0.48s;
    }

    .hero-cta {
      animation-delay: 0.66s;
    }

    .hero-button:hover,
    .hero-button:focus-visible {
      transform: translateY(-2px);
      background-color: rgba(255, 255, 255, 0.38);
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.48), rgba(210, 240, 255, 0.3));
      outline: none;
    }

    .hero-button:active {
      transform: translateY(0) scale(0.98);
    }

    .hero-button__arrow {
      font-size: 1.1em;
      transform: translateX(0);
      transition: transform 0.24s ease;
    }

    .hero-button:hover .hero-button__arrow,
    .hero-button:focus-visible .hero-button__arrow {
      transform: translateX(3px);
    }

    .science {
      min-height: 100%;
      background: url("images/mianBg.png") center center / cover no-repeat;
      isolation: isolate;
    }

    .route-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
    }

    .route {
      fill: none;
      stroke: rgba(255, 255, 255, 0.78);
      stroke-width: 0.62;
      stroke-linecap: round;
      stroke-dasharray: 1.2 1.4;
      animation: routeFlow 8s linear infinite;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.45));
    }

    .map-header {
      position: absolute;
      top: max(7.5%, calc(env(safe-area-inset-top) + 8px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      width: 88%;
      text-align: center;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .map-header::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 46%;
      transform: translate(-50%, -50%);
      width: 135%;
      height: 165%;
      border-radius: 999px;
      background:
        radial-gradient(
          ellipse,
          rgba(255, 255, 255, 0.24) 0%,
          rgba(160, 220, 255, 0.14) 38%,
          rgba(255, 255, 255, 0) 72%
        );
      filter: blur(26px);
      z-index: -1;
      pointer-events: none;
    }

    .map-kicker {
      margin-bottom: 10px;
      font-size: 11px;
      letter-spacing: 0.36em;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.78);
      text-shadow: 0 2px 10px rgba(0, 90, 160, 0.18);
    }

    .map-header h2 {
      margin: 0;
      font-size: clamp(34px, 9vw, 46px);
      line-height: 1.1;
      font-weight: 950;
      letter-spacing: -0.03em;
      text-wrap: balance;
      background: linear-gradient(180deg, #ffffff 0%, #ffffff 55%, #fff1c2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 5px 14px rgba(0, 96, 160, 0.24));
    }

    .map-header p {
      margin: 14px 0 18px;
      font-size: 16px;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 10px rgba(0, 90, 160, 0.2);
    }

    .map-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.36);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 10px 26px rgba(0, 90, 160, 0.16);
      white-space: nowrap;
      opacity: 0;
      transform: translate3d(40px, 0, 0) scale(0.96);
      will-change: transform, opacity;
    }

    .hint-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #fff1c2;
      box-shadow: 0 0 0 rgba(255, 241, 194, 0.55);
      animation: hintPulse 1.8s ease-in-out infinite;
    }

    #science.is-active .map-hint {
      animation: hintReveal 4.8s cubic-bezier(0.22, 1, 0.36, 1) 0.35s forwards;
    }

    .map-footer {
      position: absolute;
      left: 50%;
      bottom: max(8%, calc(env(safe-area-inset-bottom) + 12px));
      transform: translateX(-50%);
      z-index: 4;
      width: min(68vw, 252px);
      padding: 7px 12px 8px;
      text-align: center;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(8, 48, 78, 0.1);
      opacity: 0.8;
    }

    .map-footer__title {
      margin: 0;
      font-size: 14px;
      line-height: 1.28;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.96);
      text-shadow: 0 2px 8px rgba(0, 82, 138, 0.16);
    }

    .map-footer__sub {
      margin: 2px 0 0;
      font-size: 10px;
      line-height: 1.45;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.76);
      text-transform: uppercase;
    }

    .map-pin {
      position: absolute;
      width: clamp(62px, 16vw, 72px);
      transform: translate(-50%, -50%);
      border: 0;
      background: transparent;
      color: #0067a8;
      font-weight: 800;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
      z-index: 5;
      animation: pinFloat 3.2s ease-in-out infinite;
      padding: 0;
    }

    .map-pin img {
      width: clamp(56px, 14vw, 66px);
      height: clamp(56px, 14vw, 66px);
      display: block;
      margin: 0 auto 4px;
      filter: drop-shadow(0 8px 16px rgba(0, 92, 160, 0.22));
      animation: pinPulse 2.9s ease-in-out infinite;
    }

    .map-pin span {
      display: block;
      text-shadow:
        0 2px 10px rgba(255, 255, 255, 0.58),
        0 1px 2px rgba(255, 255, 255, 0.75);
    }

    .map-pin:focus-visible {
      outline: none;
    }

    .map-pin:focus-visible img,
    .map-pin:hover img {
      filter:
        drop-shadow(0 10px 18px rgba(0, 92, 160, 0.26))
        drop-shadow(0 0 14px rgba(255, 255, 255, 0.45));
    }

    .pin-airport { top: 34%; left: 50%; animation-delay: -0.2s; }
    .pin-dutyfree { top: 45%; left: 24%; animation-delay: -0.8s; }
    .pin-trade { top: 48%; left: 72%; animation-delay: -1.3s; }
    .pin-startup { top: 55%; left: 50%; animation-delay: -0.5s; }
    .pin-customs { top: 64%; left: 30%; animation-delay: -1.7s; }
    .pin-island { top: 66%; left: 68%; animation-delay: -1.05s; }

    .pin-airport img { animation-delay: -0.4s; }
    .pin-dutyfree img { animation-delay: -1s; }
    .pin-trade img { animation-delay: -1.5s; }
    .pin-startup img { animation-delay: -0.6s; }
    .pin-customs img { animation-delay: -1.9s; }
    .pin-island img { animation-delay: -1.2s; }

    .info-modal[hidden] {
      display: none;
    }

    .info-modal {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px 20px;
    }

    .info-modal__backdrop {
      position: absolute;
      inset: 0;
      border: 0;
      background: rgba(0, 40, 80, 0.28);
      padding: 0;
    }

    .info-modal__dialog {
      position: relative;
      width: min(86vw, 360px);
      height: min(460px, calc(100dvh - 48px));
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.58);
      box-shadow:
        0 28px 70px rgba(0, 70, 120, 0.28),
        0 10px 24px rgba(0, 42, 74, 0.12);
      color: #10426a;
      z-index: 1;
      transform: translateY(28px);
      animation: modalIn 420ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
      will-change: transform, opacity;
    }

    .info-modal__visual,
    .info-modal__content,
    .info-modal__close {
      position: relative;
      z-index: 1;
    }

    .info-modal__visual {
      flex: 0 0 40%;
      min-height: 0;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(11, 85, 138, 0.18), rgba(8, 41, 72, 0.24));
    }

    .info-modal__visual::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0%, rgba(6, 41, 70, 0.08) 52%, rgba(6, 34, 56, 0.2) 100%);
      pointer-events: none;
    }

    .info-modal__image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .info-modal__content {
      flex: 0 0 60%;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(232, 248, 255, 0.94));
      border-top: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.86),
        0 -10px 28px rgba(0, 89, 145, 0.08);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .info-modal__content::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .info-modal__content::after {
      content: "";
      position: sticky;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
      height: 32px;
      margin-top: -32px;
      background: linear-gradient(
        180deg,
        rgba(240, 250, 255, 0),
        rgba(240, 250, 255, 0.96)
      );
      opacity: 0;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .info-modal__content.is-scrollable::after {
      opacity: 1;
    }

    .info-modal__content.is-at-end::after {
      opacity: 0;
    }

    .info-modal__scroll {
      min-height: 100%;
      padding: 22px 24px 26px;
      display: flex;
      flex-direction: column;
    }

    .info-modal__close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #0067a8;
      font-size: 24px;
      line-height: 1;
      display: grid;
      place-items: center;
      box-shadow: 0 10px 24px rgba(8, 49, 82, 0.16);
    }

    .info-modal__eyebrow {
      display: block;
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.34em;
      color: rgba(0, 90, 150, 0.55);
      text-transform: uppercase;
    }

    .info-modal__title {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.12;
      color: #0067a8;
    }

    .info-modal__desc {
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .info-modal__desc p {
      margin: 0;
      font-size: 15px;
      line-height: 1.8;
      color: #24506f;
      text-wrap: pretty;
    }

    .app.modal-open #science {
      pointer-events: none;
    }

    .app.modal-open .info-modal {
      pointer-events: auto;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(34px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes hintPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 241, 194, 0.5);
      }
      50% {
        transform: scale(1.18);
        box-shadow: 0 0 0 8px rgba(255, 241, 194, 0);
      }
    }

    @keyframes hintReveal {
      0% {
        opacity: 0;
        transform: translate3d(40px, 0, 0) scale(0.96);
      }
      14% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
      76% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate3d(0, -6px, 0) scale(0.98);
      }
    }

    @keyframes heroFadeUp {
      from {
        opacity: 0;
        transform: translateY(32px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05),
          0 16px 36px rgba(4, 18, 48, 0.26),
          0 0 0 rgba(255, 255, 255, 0);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.07),
          0 18px 38px rgba(4, 18, 48, 0.3),
          0 0 30px rgba(255, 255, 255, 0.18),
          0 0 48px rgba(157, 216, 255, 0.16);
      }
    }

    @keyframes borderFlow {
      to {
        --cta-border-angle: 360deg;
      }
    }

    @keyframes particleTwinkle {
      0%, 100% {
        opacity: 0.18;
        transform: translate3d(0, 0, 0);
      }
      50% {
        opacity: 0.48;
        transform: translate3d(0, -4px, 0);
      }
    }

    @keyframes sunRayFloat {
      0% {
        transform: translateX(-2%) translateY(-1%) rotate(-18deg);
        opacity: 0.42;
      }
      50% {
        transform: translateX(4%) translateY(2%) rotate(-18deg);
        opacity: 0.82;
      }
      100% {
        transform: translateX(-2%) translateY(-1%) rotate(-18deg);
        opacity: 0.42;
      }
    }

    @keyframes beamDriftLeft {
      0%, 100% {
        transform: translate3d(0, 0, 0) rotate(14deg);
      }
      50% {
        transform: translate3d(28px, 14px, 0) rotate(18deg);
      }
    }

    @keyframes beamDriftRight {
      0%, 100% {
        transform: translate3d(0, 0, 0) rotate(-16deg);
      }
      50% {
        transform: translate3d(-24px, 10px, 0) rotate(-11deg);
      }
    }

    @keyframes pinFloat {
      0%, 100% {
        transform: translate(-50%, -50%) translateY(0);
      }
      50% {
        transform: translate(-50%, -50%) translateY(-8px);
      }
    }

    @keyframes pinPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.04);
      }
    }

    @keyframes routeFlow {
      from {
        stroke-dashoffset: 0;
      }
      to {
        stroke-dashoffset: -24;
      }
    }

    @media (min-width: 431px) {
      .hero-content {
        width: var(--hero-max-width);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #start,
      #science {
        transition: none !important;
      }

      .hero-kicker,
      .hero-title,
      .hero-subtitle,
      .hero-cta {
        animation: none !important;
        opacity: 1;
        transform: none;
      }

      .sun-rays::before,
      .sun-rays::after {
        animation: none;
      }

      .hero-cta::after {
        animation: none !important;
      }

      .map-pin,
      .map-pin img,
      .route {
        animation: none !important;
      }

      .info-modal__dialog {
        animation: none !important;
        transform: none !important;
      }

      .hint-dot {
        animation: none !important;
      }

      .map-hint {
        animation: none !important;
        opacity: 1;
        transform: none;
      }

      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="section screen hero" id="start" aria-labelledby="hero-title" aria-hidden="false">
      <div class="hero-beam hero-beam--left" aria-hidden="true"></div>
      <div class="hero-beam hero-beam--right" aria-hidden="true"></div>
      <div class="hero-grid" aria-hidden="true"></div>
      <div class="hero-particles" aria-hidden="true"></div>
      <div class="sun-rays" aria-hidden="true"></div>

      <div class="hero-content">
        <div class="hero-eyebrow hero-kicker">HAINAN FREE TRADE PORT</div>
        <h1 class="hero-title" id="hero-title">
          <span>海南自由贸易港</span>
          <span>全岛封关运作</span>
        </h1>
        <p class="hero-slogan hero-subtitle">一座岛，连接更大的世界</p>
        <div class="hero-cta">
          <button
            class="hero-button"
            type="button"
            aria-label="开启探索并切换到科普页"
          >
            <span>开启探索</span>
            <span class="hero-button__arrow" aria-hidden="true">→</span>
          </button>
        </div>
      </div>

    </section>

    <section class="section screen science" id="science" aria-label="探索内容页背景" aria-hidden="true">
      <svg class="route-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <path class="route" d="M50 55 Q46 45 50 34" />
        <path class="route" d="M50 55 Q39 47 24 45" />
        <path class="route" d="M50 55 Q62 48 72 48" />
        <path class="route" d="M50 55 Q40 62 30 64" />
        <path class="route" d="M50 55 Q61 63 68 66" />
      </svg>

      <div class="map-header" aria-hidden="true">
        <div class="map-kicker">HAINAN FREE TRADE PORT</div>
        <h2>海南 · 开放坐标</h2>
        <p>探索自由贸易港新图景</p>
        <div class="map-hint">
          <span class="hint-dot"></span>
          请点击岛上的开放节点查看
        </div>
      </div>

      <div class="map-footer" aria-hidden="true">
        <p class="map-footer__title">向海而兴，向世界而行</p>
        <p class="map-footer__sub">Hainan Free Trade Port</p>
      </div>

      <button class="map-pin pin-airport" type="button" aria-label="国际出行" data-title="国际出行" data-kicker="GLOBAL CONNECTIVITY" data-desc="封关运作后，海南国际航空网络和口岸服务体系将持续完善，连接全球主要城市的航线更加密集。

旅客出入境流程更加高效便利，国际中转、跨境旅游和商务往来体验持续提升。
依托自由贸易港政策优势，海南正加速建设面向太平洋、印度洋的重要开放门户。

未来的海南，将成为中国链接世界的重要海岛枢纽。" data-bg="images/popup_bg_airport.png">
        <img src="images/icon_airport.png" alt="">
        <span>国际出行</span>
      </button>

      <button class="map-pin pin-dutyfree" type="button" aria-label="免税消费" data-title="免税消费" data-kicker="GLOBAL SHOPPING" data-desc="全岛封关运作后，海南离岛免税政策将进一步优化升级，国际品牌、进口商品和特色消费场景持续丰富。

消费者不仅能够享受更加便捷的购物体验，还能接触到更多全球优质商品与潮流品牌。
从高端美妆、奢侈品到智能科技产品，海南正逐渐成为国际消费资源汇聚的重要目的地。

封关后的海南，将不仅是“旅游购物天堂”，更是面向全球消费者的国际消费中心。" data-bg="images/popup_bg_dutyfree.png">
        <img src="images/icon_dutyfree.png" alt="">
        <span>免税消费</span>
      </button>

      <button class="map-pin pin-trade" type="button" aria-label="国际贸易" data-title="国际贸易" data-kicker="GLOBAL TRADE" data-desc="全岛封关运作将进一步提升海南对外贸易便利化水平，推动货物、资金和产业要素更加高效流动。

依托港口、机场和国际物流体系，海南正在形成覆盖全球的重要贸易通道。
海运、空运和跨境供应链协同效率持续增强，为企业提供更加开放、高效的国际营商环境。

海南正从“国际旅游岛”，迈向更高水平开放的自由贸易港。" data-bg="images/popup_bg_trade.png">
        <img src="images/icon_trade.png" alt="">
        <span>国际贸易</span>
      </button>

      <button class="map-pin pin-startup" type="button" aria-label="创业机遇" data-title="创业机遇" data-kicker="INNOVATION HUB" data-desc="封关运作为海南带来了更加开放的产业环境，也为创新创业释放出更多发展空间。

现代服务业、高新技术产业、数字经济、生物科技等领域正在加速聚集。
政策支持、人才引进和国际化营商环境不断完善，为青年创业者和企业创新提供更广阔舞台。

海南正在成为面向未来的新兴开放创新高地。" data-bg="images/popup_bg_startup.png">
        <img src="images/icon_startup_fixed.png" alt="">
        <span>创业机遇</span>
      </button>

      <button class="map-pin pin-customs" type="button" aria-label="二线管住" data-title="二线管住" data-kicker="SMART CUSTOMS" data-desc="全岛封关并不意味着“封岛”，而是在更高水平开放基础上建立更加精准高效的监管体系。

海南与境内其他地区之间，将按照规则实施“二线口岸”管理，保障货物流动安全有序。
通过智慧监管、数字海关和风险防控体系建设，实现“放得开、管得住”。

开放与安全并重，是海南自由贸易港建设的重要基础。" data-bg="images/popup_bg_customs.png">
        <img src="images/icon_customs_fixed.png" alt="">
        <span>二线管住</span>
      </button>

      <button class="map-pin pin-island" type="button" aria-label="岛内自由" data-title="岛内自由" data-kicker="FREE FLOW" data-desc="封关运作后，海南岛内的货物、资金、人员和产业要素流动将更加便利高效。

企业经营、产业协同和资源配置效率持续提升，市场活力进一步释放。
从国际旅游消费，到现代产业发展，海南正逐步形成更加开放自由的岛内经济生态。

一座更加开放、更具活力的自由贸易港，正在加速成型。" data-bg="images/popup_bg_island.png">
        <img src="images/icon_island_fixed.png" alt="">
        <span>岛内自由</span>
      </button>
    </section>

    <div class="info-modal" id="infoModal" hidden aria-hidden="true">
      <button class="info-modal__backdrop" type="button" aria-label="关闭弹窗" data-close-modal></button>
      <div class="info-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDesc" tabindex="-1">
        <button class="info-modal__close" type="button" aria-label="关闭弹窗" data-close-modal>×</button>
        <div class="info-modal__visual" aria-hidden="true">
          <img class="info-modal__image" id="modalImage" alt="">
        </div>
        <div class="info-modal__content">
          <div class="info-modal__scroll">
            <p class="info-modal__eyebrow" id="modalEyebrow"></p>
            <h2 class="info-modal__title" id="modalTitle"></h2>
            <div class="info-modal__desc" id="modalDesc"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const reduceMotionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
    const startScreen = document.querySelector("#start");
    const scienceScreen = document.querySelector("#science");
    const exploreButton = document.querySelector(".hero-button");
    const pins = document.querySelectorAll(".map-pin");
    const app = document.querySelector(".app");
    const infoModal = document.querySelector("#infoModal");
    const modalEyebrow = document.querySelector("#modalEyebrow");
    const modalTitle = document.querySelector("#modalTitle");
    const modalDesc = document.querySelector("#modalDesc");
    const modalImage = document.querySelector("#modalImage");
    const modalContent = document.querySelector(".info-modal__content");
    const modalDialog = document.querySelector(".info-modal__dialog");
    let scienceRevealTimer = null;
    let lastActivePin = null;

    if (startScreen && scienceScreen && exploreButton) {
      exploreButton.addEventListener("click", () => {
        if (exploreButton.disabled) return;

        exploreButton.disabled = true;
        exploreButton.setAttribute("aria-disabled", "true");
        startScreen.classList.add("is-leaving");
        startScreen.setAttribute("aria-hidden", "true");

        if (reduceMotionQuery.matches) {
          scienceScreen.classList.add("is-active");
          scienceScreen.setAttribute("aria-hidden", "false");
          return;
        }

        if (scienceRevealTimer) {
          clearTimeout(scienceRevealTimer);
        }

        scienceRevealTimer = window.setTimeout(() => {
          scienceScreen.classList.add("is-active");
          scienceScreen.setAttribute("aria-hidden", "false");
          scienceRevealTimer = null;
        }, 260);
      });
    }

    function syncModalScrollHint() {
      if (!modalContent) return;
      const isScrollable = modalContent.scrollHeight - modalContent.clientHeight > 4;
      const isAtEnd = modalContent.scrollTop + modalContent.clientHeight >= modalContent.scrollHeight - 4;
      modalContent.classList.toggle("is-scrollable", isScrollable);
      modalContent.classList.toggle("is-at-end", !isScrollable || isAtEnd);
    }

    function renderModalDescription(text) {
      if (!modalDesc) return;
      modalDesc.replaceChildren();

      const segments = (text || "")
        .split(/\n\s*\n/)
        .map((segment) => segment.replace(/\s*\n\s*/g, " ").trim())
        .filter(Boolean);

      if (!segments.length) {
        return;
      }

      const fragment = document.createDocumentFragment();

      segments.forEach((segment) => {
        const paragraph = document.createElement("p");
        paragraph.textContent = segment;
        fragment.appendChild(paragraph);
      });

      modalDesc.appendChild(fragment);
    }

    function openModal(pin) {
      if (!infoModal || !modalEyebrow || !modalTitle || !modalDesc || !modalImage || !modalDialog) return;
      lastActivePin = pin;
      modalEyebrow.textContent = pin.dataset.kicker || "OPEN PORT";
      modalTitle.textContent = pin.dataset.title || "";
      renderModalDescription(pin.dataset.desc || "");
      modalImage.src = pin.dataset.bg || "";
      if (modalContent) {
        modalContent.scrollTop = 0;
      }
      infoModal.hidden = false;
      infoModal.setAttribute("aria-hidden", "false");
      app?.classList.add("modal-open");
      requestAnimationFrame(syncModalScrollHint);
      modalDialog.focus();
    }

    function closeModal() {
      if (!infoModal) return;
      infoModal.hidden = true;
      infoModal.setAttribute("aria-hidden", "true");
      app?.classList.remove("modal-open");
      if (lastActivePin) {
        lastActivePin.focus();
      }
    }

    pins.forEach((pin) => {
      pin.addEventListener("click", () => openModal(pin));
    });

    if (infoModal) {
      infoModal.querySelectorAll("[data-close-modal]").forEach((button) => {
        button.addEventListener("click", closeModal);
      });
    }

    if (modalContent) {
      modalContent.addEventListener("scroll", syncModalScrollHint, { passive: true });
    }

    window.addEventListener("resize", syncModalScrollHint);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && infoModal && !infoModal.hidden) {
        closeModal();
      }
    });
  </script>
</body>
</html>
